name: Build

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches:
      - 'main'

jobs:
  build:
    name: Run on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: wasabeef/import-asdf-tool-versions-action@v1.0.3
        id: asdf
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.asdf.outputs.flutter }}
          channel: stable
          cache: true

      - name: Set environment for MacOS & Ubuntu
        if: startsWith(matrix.os, 'macos') || startsWith(matrix.os, 'ubuntu')
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Set environment for Windows
        if: startsWith(matrix.os, 'windows')
        run: echo "%LOCALAPPDATA%\Pub\Cache\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Get dependencies
        run: |
          dart pub global activate melos
          dart pub get

      - name: Run tests for Dart packages
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          if [ -d "test" ]; then
            dart test --concurrency=1
          else
            echo "No test directory found, skipping dart tests."
          fi
        shell: bash

      - name: Run tests for Flutter packages
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          if [ -d "test" ]; then
            flutter test --concurrency=1
          else
            echo "No test directory found, skipping flutter tests."
          fi
        shell: bash

      - name: Run coverage
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          if [ -f "scripts/coverage.sh" ] && [ -d "packages/core" ]; then
            bash ./scripts/coverage.sh packages/core
          else
            echo "Scripts or packages not found, skipping coverage."
          fi
        shell: bash

      - uses: codecov/codecov-action@v5
        if: startsWith(matrix.os, 'ubuntu')
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./packages/core/coverage.lcov
          fail_ci_if_error: false

      - name: Generate example
        run: |
          if [ -f "melos.yaml" ]; then
            melos run gen:build_runner --no-select
          else
            echo "No melos.yaml found, skipping melos run."
          fi
        shell: bash

      - name: Check for any formatting and statically analyze the code.
        run: |
          if [ -f "melos.yaml" ]; then
            melos format
          else
            dart format --output=none --set-exit-if-changed .
          fi
          flutter analyze
        shell: bash
